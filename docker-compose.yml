# Memoria — All-in-One
#
# Build context is the project root (Memoria depends on core/ and api/ shared files).
# Both invocation styles work — context: .. is always relative to this file's location.
#
# Usage:
#   cd memoria && docker compose up -d
#   # or: docker compose -f memoria/docker-compose.yml up -d

services:

  matrixone:
    image: ${MATRIXONE_IMAGE:-matrixorigin/matrixone:latest}
    hostname: matrixone
    ports:
      - "${MATRIXONE_PORT:-6001}:6001"
      # Debug HTTP port (pprof) — disabled by default, set MATRIXONE_DEBUG_PORT to enable
      - "${MATRIXONE_DEBUG_PORT:-}:6060"
    volumes:
      - ${MATRIXONE_DATA_DIR:-./data/matrixone}:/mo-data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - memoria-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/6001' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set INSTALL_EXTRAS=local-embedding to bundle sentence-transformers (~500MB).
        # Default is empty — use an external embedding provider via MEMORIA_EMBEDDING_* env vars.
        INSTALL_EXTRAS: ${INSTALL_EXTRAS:-}
    hostname: memoria-api
    ports:
      - "${API_PORT:-8100}:8000"
    environment:
      - MEMORIA_DB_HOST=matrixone
      - MEMORIA_DB_PORT=6001
      - MEMORIA_DB_USER=${MEMORIA_DB_USER:-root}
      - MEMORIA_DB_PASSWORD=${MEMORIA_DB_PASSWORD:-111}
      - MEMORIA_DB_NAME=${MEMORIA_DB_NAME:-memoria}
      - MEMORIA_MASTER_KEY=${MEMORIA_MASTER_KEY:?Set MEMORIA_MASTER_KEY in .env (min 16 chars)}
      - MEMORIA_EMBEDDING_PROVIDER=${MEMORIA_EMBEDDING_PROVIDER:-local}
      - MEMORIA_EMBEDDING_MODEL=${MEMORIA_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - MEMORIA_EMBEDDING_API_KEY=${MEMORIA_EMBEDDING_API_KEY:-}
      - MEMORIA_EMBEDDING_BASE_URL=${MEMORIA_EMBEDDING_BASE_URL:-}
      # Rate limits — override for testing: MEMORIA_RATE_LIMIT_AUTH_KEYS=1000,60
      - MEMORIA_RATE_LIMIT_AUTH_KEYS=${MEMORIA_RATE_LIMIT_AUTH_KEYS:-20,60}
      - MEMORIA_RATE_LIMIT_DEFAULT=${MEMORIA_RATE_LIMIT_DEFAULT:-1000,60}
      - MEMORIA_LLM_API_KEY=${MEMORIA_LLM_API_KEY:-}
      - MEMORIA_LLM_BASE_URL=${MEMORIA_LLM_BASE_URL:-}
      - MEMORIA_LLM_MODEL=${MEMORIA_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      matrixone:
        condition: service_healthy
    networks:
      - memoria-net
    restart: unless-stopped

volumes: {}

networks:
  memoria-net:
    driver: bridge
