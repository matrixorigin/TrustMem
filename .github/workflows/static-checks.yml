name: Lint & Type Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  static-checks:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-check-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-check-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint & format check
        run: make lint

      - name: Type check
        run: make type-check
